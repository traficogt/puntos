groups:
  - name: puntos-api
    rules:
      - alert: PuntosApiHigh5xxRatio
        expr: |
          (
            sum(rate(puntos_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(puntos_http_requests_total[5m])), 0.001)
          ) > 0.02
        for: 10m
        labels:
          severity: critical
          service: puntos-api
        annotations:
          summary: "High 5xx ratio on API"
          description: "5xx responses exceeded 2% over the last 10 minutes."

      - alert: PuntosApiHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(puntos_http_request_duration_seconds_bucket[5m]))
          ) > 0.75
        for: 10m
        labels:
          severity: warning
          service: puntos-api
        annotations:
          summary: "High API p95 latency"
          description: "p95 request latency exceeded 750ms for 10 minutes."

      - alert: PuntosMetricsCollectionFailing
        expr: puntos_metrics_error > 0
        for: 5m
        labels:
          severity: warning
          service: puntos-api
        annotations:
          summary: "Metrics collection is failing"
          description: "The metrics endpoint reported an internal collection error."

  - name: puntos-ops
    rules:
      - alert: PuntosWebhookFailures24h
        expr: puntos_webhook_deliveries_24h{status="failed"} > 5
        for: 15m
        labels:
          severity: warning
          service: puntos-webhooks
        annotations:
          summary: "Webhook failures are accumulating"
          description: "Failed webhook deliveries in the last 24h exceeded 5."

      - alert: PuntosJobBacklogOld
        expr: puntos_jobs_oldest_age_seconds > 900
        for: 10m
        labels:
          severity: warning
          service: puntos-jobs
        annotations:
          summary: "Old queued jobs detected"
          description: "The oldest queued job has been waiting more than 15 minutes."

      - alert: PuntosJobFailuresPresent
        expr: puntos_jobs_total{status="failed"} > 0
        for: 15m
        labels:
          severity: warning
          service: puntos-jobs
        annotations:
          summary: "Failed background jobs present"
          description: "There are failed jobs in the background_jobs table."

      - alert: PuntosRedisQueueHealthFailing
        expr: puntos_job_queue_depth < 0
        for: 5m
        labels:
          severity: warning
          service: puntos-jobs
        annotations:
          summary: "Redis queue health check failed"
          description: "The queue health probe returned a negative queue depth."

      - alert: PuntosChurnSchedulerStale
        expr: puntos_churn_last_sent_timestamp > 0 and time() - puntos_churn_last_sent_timestamp > 172800
        for: 30m
        labels:
          severity: warning
          service: puntos-lifecycle
        annotations:
          summary: "Churn/lifecycle automation looks stale"
          description: "No churn message has been recorded for more than 48 hours."

      - alert: PuntosDbConnectionsHigh
        expr: puntos_db_connections_active > 40
        for: 10m
        labels:
          severity: warning
          service: puntos-db
        annotations:
          summary: "Active DB connections are high"
          description: "Active database connections exceeded 40 for 10 minutes."
