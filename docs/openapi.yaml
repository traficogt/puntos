openapi: 3.0.3
info:
  title: "PuntosFieles API"
  version: 1.3.7
  description: "Route-accurate OpenAPI document for the versioned /api/v1 surface."
servers:
  - url: "https://api.puntos.local"
paths:
  /api/v1/health:
    get:
      summary: "Service health probe"
      responses:
        200:
          description: "Service healthy"
        503:
          description: "Service unhealthy"
  /api/v1/ready:
    get:
      summary: "Readiness probe"
      responses:
        200:
          description: "Ready for traffic"
        503:
          description: "Not ready"
  /api/v1/live:
    get:
      summary: "Liveness probe"
      responses:
        200:
          description: "Process is alive"
  /api/v1/info:
    get:
      summary: "Service metadata"
      responses:
        200:
          description: "Version and runtime info"
  /api/v1/staff/login:
    post:
      summary: "Staff login"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffLoginRequest"
      responses:
        200:
          description: "Authenticated; cookie pf_staff is set"
        400:
          description: "Validation error"
        401:
          description: "Invalid credentials"
  /api/v1/staff/me:
    get:
      summary: "Current staff session"
      security:
        - staffAuth:
            []
      responses:
        200:
          description: "Current staff session"
        401:
          description: "Not authenticated"
  /api/v1/staff/award:
    post:
      summary: "Award points to a customer"
      security:
        - staffAuth:
            []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AwardPointsRequest"
      responses:
        200:
          description: "Points awarded"
        400:
          description: "Validation error"
        401:
          description: "Not authenticated"
        403:
          description: "Permission denied"
  /api/v1/public/business/{slug}:
    get:
      summary: "Get a business public profile by slug"
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        200:
          description: "Business public profile"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessPublicResponse"
        404:
          description: "Business not found"
  /api/v1/public/business/{slug}/join/request-code:
    post:
      summary: "Request a customer join verification code"
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestJoinCodeRequest"
      responses:
        200:
          description: "Verification code requested"
        400:
          description: "Validation error"
        404:
          description: "Business not found"
        429:
          description: "Rate limited"
  /api/v1/public/business/{slug}/join/verify:
    post:
      summary: "Verify a join code and create/login the customer"
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyJoinCodeRequest"
      responses:
        200:
          description: "Customer authenticated; cookie pf_customer is set"
        400:
          description: "Validation error"
        404:
          description: "Business not found"
        429:
          description: "Rate limited"
  /api/v1/public/customer/qr.svg:
    get:
      summary: "Get a short-lived customer QR as SVG"
      security:
        - customerAuth:
            []
      responses:
        200:
          description: "SVG QR image with X-QR-Exp, X-QR-JTI, and X-QR-Token headers"
          content:
            image/svg+xml:
              schema:
                type: string
        401:
          description: "Not authenticated"
  /api/v1/customer/me:
    get:
      summary: "Get the current customer profile"
      security:
        - customerAuth:
            []
      responses:
        200:
          description: "Current customer profile"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfileResponse"
        401:
          description: "Not authenticated"
  /api/v1/customer/referral-code:
    get:
      summary: "Get or create the current customer's referral code"
      security:
        - customerAuth:
            []
      responses:
        200:
          description: "Referral code"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralCodeResponse"
        401:
          description: "Not authenticated"
  /api/v1/customer/tier:
    get:
      summary: "Get the current customer's tier information"
      security:
        - customerAuth:
            []
      responses:
        200:
          description: "Tier info"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TierInfoResponse"
        401:
          description: "Not authenticated"
  /api/v1/admin/tiers:
    get:
      summary: "List business tiers"
      security:
        - staffAuth:
            []
      responses:
        200:
          description: "Tier list"
        401:
          description: "Not authenticated"
        403:
          description: "Owner role required"
    post:
      summary: "Create a business tier"
      security:
        - staffAuth:
            []
      responses:
        201:
          description: "Tier created"
        400:
          description: "Validation error"
        401:
          description: "Not authenticated"
        403:
          description: "Owner role required"
components:
  securitySchemes:
    staffAuth:
      type: apiKey
      in: cookie
      name: pf_staff
    customerAuth:
      type: apiKey
      in: cookie
      name: pf_customer
  schemas:
    StaffLoginRequest:
      $ref: "#/definitions/StaffLoginRequest"
      definitions:
        StaffLoginRequest:
          type: object
          properties:
            email:
              type: string
              format: email
              maxLength: 255
            password:
              type: string
              minLength: 6
          required:
            - email
            - password
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
    AwardPointsRequest:
      $ref: "#/definitions/AwardPointsRequest"
      definitions:
        AwardPointsRequest:
          type: object
          properties:
            customerQrToken:
              type: string
              minLength: 1
            amount_q:
              type: number
              minimum: 0
              maximum: 1000000
            visits:
              type: integer
              minimum: 0
              maximum: 1000
            items:
              type: integer
              minimum: 0
              maximum: 10000
            source:
              type: string
              enum:
                - online
                - offline
              default: online
            meta:
              type: object
              additionalProperties:
                {}
            txId:
              type: string
              format: uuid
          required:
            - customerQrToken
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
    RequestJoinCodeRequest:
      $ref: "#/definitions/RequestJoinCodeRequest"
      definitions:
        RequestJoinCodeRequest:
          type: object
          properties:
            phone:
              type: string
              minLength: 6
            name:
              type: string
              maxLength: 120
          required:
            - phone
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
    VerifyJoinCodeRequest:
      $ref: "#/definitions/VerifyJoinCodeRequest"
      definitions:
        VerifyJoinCodeRequest:
          type: object
          properties:
            phone:
              type: string
              minLength: 6
            code:
              type: string
              minLength: 4
              maxLength: 10
            name:
              type: string
              maxLength: 120
            referralCode:
              type: string
              minLength: 6
              maxLength: 6
          required:
            - phone
            - code
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
    BusinessPublicResponse:
      $ref: "#/definitions/BusinessPublicResponse"
      definitions:
        BusinessPublicResponse:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            slug:
              type: string
            category:
              type:
                - string
                - null
            program_type:
              type: string
              enum:
                - SPEND
                - VISIT
                - ITEM
          required:
            - id
            - name
            - slug
            - program_type
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
    CustomerProfileResponse:
      $ref: "#/definitions/CustomerProfileResponse"
      definitions:
        CustomerProfileResponse:
          type: object
          properties:
            ok:
              type: boolean
              const: true
            business:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                slug:
                  type: string
              required:
                - id
                - name
                - slug
              additionalProperties: false
            customer:
              type: object
              properties:
                id:
                  type: string
                phone:
                  type: string
                name:
                  type:
                    - string
                    - null
                points:
                  type: number
                pending_points:
                  type: number
                lifetime_points:
                  type: number
                created_at:
                  type: string
                last_visit_at:
                  type:
                    - string
                    - null
              required:
                - id
                - phone
                - name
                - points
                - pending_points
                - lifetime_points
                - created_at
                - last_visit_at
              additionalProperties: false
          required:
            - ok
            - business
            - customer
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
    ReferralCodeResponse:
      $ref: "#/definitions/ReferralCodeResponse"
      definitions:
        ReferralCodeResponse:
          type: object
          properties:
            ok:
              type: boolean
              const: true
            referral_code:
              type: string
          required:
            - ok
            - referral_code
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
    TierInfoResponse:
      $ref: "#/definitions/TierInfoResponse"
      definitions:
        TierInfoResponse:
          type: object
          properties:
            ok:
              type: boolean
              const: true
            tier:
              type: object
              additionalProperties:
                {}
          required:
            - ok
            - tier
          additionalProperties: false
      $schema: "http://json-schema.org/draft-07/schema#"
