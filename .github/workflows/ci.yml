name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puntos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d puntos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: puntos
      DB_USER: postgres
      DB_PASSWORD: postgres
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps (locked, no scripts)
        run: npm ci --ignore-scripts
      - name: Migrations lock (immutability guard)
        run: npm run ops:migrate:lock-check
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: OpenAPI generation is current
        run: |
          npm run openapi:generate
          git diff --exit-code -- docs/openapi.json docs/openapi.yaml
      - name: Migrations (apply)
        run: npm run ops:migrate
      - name: RLS check
        run: npm run ops:rls-check
      - name: Security scan (patterns)
        run: npm run ops:security-scan
      - name: Perf sanity
        run: npm run ops:perf-sanity
      - name: Dependency audit (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high --ignore-scripts

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t puntos-ci:${{ github.sha }} .
      - name: Pull Trivy image
        run: docker pull aquasec/trivy:0.56.1
      - name: Scan container image (high/critical)
        run: >
          docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          aquasec/trivy:0.56.1
          image
          --scanners vuln
          --exit-code 1
          --ignore-unfixed
          --pkg-types os,library
          --severity HIGH,CRITICAL
          puntos-ci:${{ github.sha }}

  smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puntos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d puntos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: puntos
      DB_USER: postgres
      DB_PASSWORD: postgres
      NODE_ENV: test
      PORT: 3001
      CORS_ORIGIN: http://localhost:3001
      APP_ORIGIN: http://localhost:3001
      SUPER_ADMIN_EMAIL: super@example.com
      SUPER_ADMIN_PASSWORD: super_password_123456
      JWT_SECRET: ci_jwt_secret_abcdefghijklmnopqrstuvwxyz_123456
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Generate QR keys for tests
        run: |
          openssl genpkey -algorithm Ed25519 -out qr-private.pem
          openssl pkey -in qr-private.pem -pubout -out qr-public.pem
          {
            echo "QR_PRIVATE_KEY_PEM<<EOF"
            cat qr-private.pem
            echo "EOF"
            echo "QR_PUBLIC_KEY_PEM<<EOF"
            cat qr-public.pem
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start app
        run: |
          node src/app/server.js > /tmp/puntos-api.log 2>&1 &
          TIMEOUT=80 bash src/scripts/wait-for-api.sh http://localhost:3001/api/health
      - name: Run HTTP smoke gate
        run: npm run ops:smoke -- --base-url http://localhost:3001 --require-super-login
      - name: Run smoke E2E
        run: npx playwright test tests/e2e/smoke.spec.js --project=chromium
      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-e2e-api-log
          path: /tmp/puntos-api.log

  observability-drill:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run alert drill
        run: npm run ops:alerts:drill

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci
